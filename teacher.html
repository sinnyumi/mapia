    <style>
        body{
    font-family:'Noto Sans KR',sans-serif;
    background:
    radial-gradient(circle at top,
    rgba(20,40,80,.9),
    rgba(5,10,20,1)),
    url('https://images.unsplash.com/photo-1503435824048-a799a3a84bf7?q=80&w=2000');
    background-size:cover;
    background-attachment:fixed;
    color:#f1f5f9;
}
        .case-header{
    background:linear-gradient(
        135deg,
        rgba(19,33,58,.9),
        rgba(27,43,66,.95)
    );

    border:3px solid #c89b3c;
    border-radius:24px;
    padding:20px 30px;
    box-shadow:0 0 30px rgba(200,155,60,.2);
}

.case-header h1{
    font-size:2.5rem;
    font-weight:900;
    color:#f8d36a;
    letter-spacing:2px;
}

.case-header p{
    color:#cbd5e1;
    margin-top:6px;

}

.case-number{
    display:inline-block;
    background:#7f1d1d;
    color:white;
    padding:6px 14px;
    border-radius:999px;
    font-size:12px;
    font-weight:900;
    letter-spacing:2px;
    margin-bottom:10px;
}
.detective-badge{
    background:#0f172a;
    border:2px solid #c89b3c;
    padding:10px 18px;
    border-radius:12px;
    color:#f8d36a;
    font-weight:900;
    text-align:center;
    margin-bottom:10px;
}
        
       @keyframes pulse-border {
    0%, 100% {
        border-color: rgba(239, 68, 68, 0.5);
    }
    50% {
        border-color: rgba(239, 68, 68, 1);
    }
}

</head>
<body class="min-h-screen p-6 flex flex-col items-center">

    <div class="w-full max-w-7xl space-y-6">
        <div class="bg-[#101b2b] border-4 border-[#b8860b]/60 rounded-3xl p-8 flex justify-between items-center shadow-2xl">
            <div class="case-header">
    <div>
        <span class="case-number">
        CASE FILE #2026-001
        </span>
<div class="detective-badge">
🕵️‍♂️ EDOGAWA CONAN
</div>
        <h1>
        🔍 명탐정 코난 수사본부
        </h1>

        <p>
        중국어 마피아 사건
        </p>
    </div>
</div>
            <div class="bg-[#05090f] px-8 py-4 rounded-2xl border-2 border-[#223956] text-right">
                <span class="text-xs lg:text-sm text-[#e0a96d] block font-black tracking-wider">사건 종료까지</span>
                <span id="display-timer" class="text-4xl lg:text-5xl font-black font-orbitron text-white">05:00</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="bg-[#101b2b] border-2 border-[#223956] rounded-2xl p-6 space-y-5 shadow-xl h-fit">
                <div class="flex justify-between items-center border-b border-[#223956] pb-3">
                    <h2 class="text-xl font-black text-[#e0a96d]">📂 사건 파일 설정</h2>
                    <button onclick="toggleSetupVisibility()" id="btn-toggle-setup" class="bg-[#1b2b42] text-xs text-[#e0a96d] px-3 py-1.5 rounded-lg font-bold border border-[#e0a96d]/30 cursor-pointer">👁️ 설정창 숨기기</button>
                </div>
                
                <div id="setup-content" class="space-y-4 text-base font-bold">
                    <div>
                        <label class="block text-gray-300 text-sm mb-1.5 font-black">👤 용의선상 학생 이름 기입 (공백/쉼표 구분)</label>
                        <textarea id="input-students" class="w-full h-36 bg-[#05090f] border border-[#223956] rounded-xl p-3 text-white text-sm focus:outline-none focus:border-[#e0a96d] font-medium" placeholder="남도일, 유미란, 하인성, 정보라"></textarea>
                    </div>
                    <!-- 🧩 용의자 프로필 단서 풀 설정 커스텀 영역 -->
<div class="space-y-2 border-t border-b border-[#223956]/50 py-3 text-left">
    <span class="text-xs text-[#e0a96d] block font-black">🧩 용의자 프로필 단서 풀 설정 (쉼표 구분)</span>
    <div>
        <label class="block text-gray-400 text-xs mb-1">🏫 학년 설정</label>
        <input type="text" id="clues-grades" value="1niánjí, 2niánjí, 3niánjí" class="w-full bg-[#05090f] border border-[#223956] rounded-lg p-2 text-white text-xs font-medium focus:outline-none focus:border-[#e0a96d]">
    </div>
    <div>
        <label class="block text-gray-400 text-xs mb-1">🎨 취미 설정</label>
        <input type="text" id="clues-hobbies" value="chànggē, zuò cài, pāi shìpín, kàn diànyǐng, tīng yīnyuè" class="w-full bg-[#05090f] border border-[#223956] rounded-lg p-2 text-white text-xs font-medium focus:outline-none focus:border-[#e0a96d]">
    </div>
    <div>
        <label class="block text-gray-400 text-xs mb-1">⚡ 능력(특기) 설정</label>

    </div>
    <div>
        <label class="block text-gray-400 text-xs mb-1">👔 장래희망 설정</label>
        <textarea id="clues-jobs" class="w-full h-20 bg-[#05090f] border border-[#223956] rounded-lg p-2 text-white text-xs font-medium focus:outline-none focus:border-[#e0a96d]">yùndòngyuán,
yīshēng,
wǎnghóng,
zuòjiā</textarea>
    </div>
</div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-red-400 text-sm mb-1.5 font-black">🚨 마피아 인원</label>
                            <input type="number" id="count-mafia" value="1" min="1" class="w-full bg-[#05090f] border-2 border-[#223956] rounded-xl p-2.5 text-white font-black text-center text-lg focus:outline-none focus:border-red-500">
                        </div>
                        <div>
                            <label class="block text-cyan-400 text-sm mb-1.5 font-black">⚡ 경찰 인원</label>
                            <input type="number" id="count-police" value="1" min="0" class="w-full bg-[#05090f] border-2 border-[#223956] rounded-xl p-2.5 text-white font-black text-center text-lg focus:outline-none focus:border-cyan-500">
                        </div>
                    </div>

                    <button onclick="generateGameData()" class="w-full bg-gradient-to-r from-[#9b1c1c] to-[#bd2c2c] text-white font-black py-4 rounded-xl transition-all text-sm cursor-pointer shadow-md active:scale-95">🎲 사건 유포 및 역할 배분</button>
                    <button onclick="resetServerAll()" class="w-full bg-slate-800 hover:bg-slate-700 text-gray-300 font-bold py-2.5 rounded-xl text-xs cursor-pointer border border-gray-600 active:scale-95">🔄 서버 전체 데이터 초기화(RESET)</button>
                </div>

                <div class="border-t border-[#223956] pt-4 space-y-3">
                    <button onclick="startTimer()" class="w-full bg-[#1b2b42] hover:bg-[#223956] text-[#e0a96d] font-black py-3.5 rounded-xl text-sm border-2 border-[#e0a96d]/30 cursor-pointer shadow-lg">⏱️ 수사 시작</button>
                    <button onclick="extractAllSuspects()" class="w-full bg-red-950/40 hover:bg-red-900/60 text-red-400 font-black py-3.5 rounded-xl text-sm border-2 border-red-900/40 cursor-pointer shadow-lg">⚖️ 특별 재판 개시</button>
                </div>
            </div>

            <div class="bg-[#101b2b] border border-[#223956] rounded-2xl p-6 flex flex-col lg:col-span-2 shadow-xl">
                <h2 class="text-xl lg:text-2xl font-black text-[#e0a96d] mb-5 flex items-center border-b border-[#223956] pb-3">
                    <span class="w-3 h-3 rounded-full bg-red-600 mr-2.5 animate-ping"></span> 📋 사건 수사 브리핑 보드
                </h2>
                
                <div id="chart-container" class="grid grid-cols-4 gap-4 flex-1">
                    <p class="col-span-4 text-base text-gray-500 italic text-center py-20 font-bold">교실에서 수집된 증언과
알리바이 분석 결과를
실시간으로 반영합니다.</p>
                </div>
            </div>
        </div>

        <div id="court-panel" class="
bg-gradient-to-b
from-[#2b0d0d]
to-[#120606]
border-4
border-[#c89b3c]
rounded-3xl
p-8
hidden
space-y-6
shadow-2xl
">
            <div class="text-center">
                <span class="bg-red-950 text-red-400 text-sm font-black px-5 py-2 rounded-full border border-red-900/40 font-orbitron">⚖️ 긴급 특별 재판</span>
                <h3 class="text-3xl font-black text-white mt-4">⚖️ 피의 기소자 배심원 투표 실시간 집계 현황</h3>
                <p class="text-sm text-gray-400 mt-2 font-bold">학생들 기기 화면에 나타난 용의자 처형/구출 판결 표수가 클라우드로 실시간 반영 중입니다.</p>
            </div>
            <div id="court-scales-container" class="space-y-5 max-w-4xl mx-auto"></div>
            <div class="flex justify-center pt-3">
                <button onclick="closeCourt()" class="bg-gradient-to-r from-[#9b1c1c] to-[#bd2c2c] text-white font-black px-10 py-4 rounded-xl text-base cursor-pointer shadow-lg active:scale-95">재판 결과 최종 선포 및 징계 봉쇄</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://hanyuyouxi-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let gameState = { students: {} };
        let rawVotesRegistry = {}; 
        let courtVotesData = {}; 
        let currentSuspectList = [];
        let timerInterval = null;



        db.ref('students').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                gameState.students = data;
                renderChart( );
            }
        });

        db.ref('rawVotes').on('value', (snapshot) => {
            rawVotesRegistry = snapshot.val() || {};
            renderChart();
        });

        db.ref('courtVotes').on('value', (snapshot) => {
            courtVotesData = snapshot.val() || {};
            renderCourtScales();
        });

        db.ref('globalTimer').on('value', (snapshot) => {
            const timeStr = snapshot.val();
            if(timeStr) document.getElementById('display-timer').innerText = timeStr;
        });

        db.ref('courtStatus').on('value', (snapshot) => {
            const status = snapshot.val();
            if(status && status.active) {
                currentSuspectList = status.suspect.split(', ').filter(n => n.trim().length > 0);
                document.getElementById('court-panel').classList.remove('hidden');
            } else {
                document.getElementById('court-panel').classList.add('hidden');
            }
        });


        function resetServerAll() {
            if(!confirm("서버의 모든 게임 데이터를 초기화하시겠습니까? 학생 기기도 전부 로그아웃됩니다.")) return;
            clearInterval(timerInterval);
            db.ref('/').set({
                students: {},
                cluesPool: {},
                rawVotes: {},
                courtVotes: {},
                courtStatus: { active: false, suspect: "" },
                globalTimer: "05:00",
                signal: "RESET_ALL"
            });
            document.getElementById('chart-container').innerHTML = `<p class="text-base text-gray-500 italic text-center py-20 font-bold">서버 데이터가 완전히 리셋되었습니다.</p>`;
            alert("서버 완전 리셋 완료!");
        }

        function generateGameData() {
            const raw = document.getElementById('input-students').value;
            const names = raw.split(/[\s,]+/).filter(n => n.trim().length > 0);
            const mafiaCnt = parseInt(document.getElementById('count-mafia').value) || 1;
            const policeCnt = parseInt(document.getElementById('count-police').value) || 1;

            if (names.length < 3) { alert("최소 3명 이상의 학생을 기입하세요."); return; }

            const grades = ["1학년", "2학년", "3학년"];
            const hobbies = ["요리하기", "노래부르기", "영상찍기", "영화보기", "음악듣기"];
            const skills = ["축구", "탁구", "농구"];
            const jobs = [
                { cn: "运动选手", py: "yùndòng xuǎnshǒu", ko: "운동선수" },
                { cn: "医生", py: "yīshēng", ko: "의사" },
                { cn: "网络红人", py: "wǎngluò hóngrén", ko: "인플루언서" },
                { cn: "作家", py: "zuòjiā", ko: "작가" }
            ];

            let shuffled = [...names].sort(() => Math.random() - 0.5);
            let uploadData = {};

            shuffled.forEach((name, idx) => {
                let role = "시민";
                if(idx < mafiaCnt) role = "마피아";
                else if(idx < mafiaCnt + policeCnt) role = "경찰";

                let profile = {
                    grade: grades[Math.floor(Math.random() * grades.length)],
                    hobby: hobbies[Math.floor(Math.random() * hobbies.length)],
                    skill: skills[Math.floor(Math.random() * skills.length)],
                    job: jobs[Math.floor(Math.random() * jobs.length)]
                };
                uploadData[name] = { name, role, isAlive: true, profile, votedCount: 0 };
            });

            const metaClues = { grade: grades, hobby: hobbies, skill: skills, job: jobs.map(j => j.ko) };

            db.ref('/').set({
                students: uploadData,
                cluesPool: metaClues,
                rawVotes: {},
                courtVotes: {},
                courtStatus: { active: false, suspect: "" },
                globalTimer: "05:00",
                signal: "INIT"
            });
            alert("수사망 가동 완료! 인원 세팅에 맞춰 역할이 배분되었습니다.");
        }

        function startTimer() {
            let sec = 300;
            clearInterval(timerInterval);
            db.ref('signal').set('START_TIMER');
            timerInterval = setInterval(() => {
                sec--;
                if(sec <= 0) clearInterval(timerInterval);
                const m = String(Math.floor(sec / 60)).padStart(2, '0');
                const s = String(sec % 60).padStart(2, '0');
                db.ref('globalTimer').set(`${m}:${s}`);
            }, 1000);
        }

        function recalculateVotedCounts() {
            Object.keys(gameState.students).forEach(name => {
                gameState.students[name].votedCount = 0;
            });
            Object.values(rawVotesRegistry).forEach(votesArray => {
                votesArray.forEach(suspectName => {
                    if (gameState.students[suspectName]) {
                        gameState.students[suspectName].votedCount++;
                    }
                });
            });
        }

        function renderChart() {
            recalculateVotedCounts();
            const container = document.getElementById('chart-container');
            container.innerHTML = "";
            const list = Object.values(gameState.students);
            if(list.length === 0) return;

            let visibleList = [...list];
            if(visibleList.length > 8) visibleList = visibleList.slice(0, 8);

           visibleList.forEach((s, idx) => {

    const hasVotes = s.votedCount > 0 && s.isAlive;
    const suspicion = Math.min(100, s.votedCount * 25);

    const statusBadge = s.isAlive
        ? `<span class="text-emerald-400 font-extrabold text-[11px] bg-emerald-950/60 px-2 py-0.5 rounded border border-emerald-800">🟢 생존</span>`
        : `<span class="text-red-500 font-extrabold text-[11px] bg-red-950/60 px-2 py-0.5 rounded border border-red-900 line-through">💀 탈락</span>`;

    container.innerHTML += `
        <div class="
            bg-[#efe5cf]
            border-4
            border-[#b08a42]
            rounded-xl
            overflow-hidden
            shadow-2xl
            relative
            min-h-[260px]
        ">

            <div class="absolute top-2 left-2 z-20">
                ${statusBadge}
            </div>

            <div class="
                absolute top-2 right-2
                bg-red-800
                text-white
                font-black
                text-xs
                px-3 py-1
                rounded
                rotate-12
                z-20
            ">
                WANTED
            </div>

            <div class="w-full h-48 bg-[#efe5cf] overflow-hidden">
                <img src="https://raw.githubusercontent.com/sinnyumi/mapia/main/%EB%B2%94%EC%9D%B8%EC%9D%B4%EB%AF%B8%EC%A7%80.png" alt="범인 이미지">
            </div>

            <div class="
                bg-[#f8f1df]
                p-4
                text-center
                border-t
                border-[#d4c2a1]
            ">

                <div class="text-[#111827] text-xl font-black">
                    ${s.name}
                </div>

                <div class="font-black text-red-500 mt-2">
                    🎯 ${s.votedCount} 표 누적
                </div>

                <div class="mt-3">
                    <div class="text-xs font-black text-red-500">
                        🚨 의심도
                    </div>

                    <div class="w-full bg-slate-300 rounded-full h-3 mt-1">
                        <div
                            class="bg-red-600 h-3 rounded-full"
                            style="width:${suspicion}%">
                        </div>
                    </div>

                    <div class="text-red-600 font-black mt-1">
                        ${suspicion}%
                    </div>
                </div>

            </div>
        </div>
    `;
});

            if (visibleList.length > 0 && visibleList.length < 8) {
                const dummyCount = 8 - visibleList.length;
                for (let i = 0; i < dummyCount; i++) {
                    container.innerHTML += `<div class="bg-[#05090f]/20 border border-[#223956]/20 rounded-2xl p-4 min-h-[260px] border-dashed flex items-center justify-center text-gray-700 font-bold text-xs">수사망 공석</div>`;
                }
            }
        }

        function extractAllSuspects() {
            recalculateVotedCounts();
            const list = Object.values(gameState.students).filter(s => s.isAlive && s.votedCount > 0);
            if(list.length === 0) { alert("제출된 알리바이 수사 기록 패킷이 전무합니다."); return; }
            
            currentSuspectList = list.map(s => s.name);
            let initCourtVotes = {};
            currentSuspectList.forEach(name => { initCourtVotes[name] = { execute: 0, save: 0 }; });

            db.ref('courtVotes').set(initCourtVotes);
            const suspectString = currentSuspectList.join(', ');
            db.ref('courtStatus').set({ active: true, suspect: suspectString });
            db.ref('signal').set('START_COURT');
        }

        function renderCourtScales() {
            const container = document.getElementById('court-scales-container');
            if(!container) return;
            container.innerHTML = "";

            currentSuspectList.forEach(name => {
                const data = courtVotesData[name] || { execute: 0, save: 0 };
                const total = data.execute + data.save || 1;
                const exePct = (data.execute / total) * 100;
                const savePct = (data.save / total) * 100;

                container.innerHTML += `
                    <div class="bg-[#05090f] p-5 rounded-2xl border-2 border-[#223956] space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-white font-black text-lg lg:text-xl">👤 용의 기소자: <span class="text-red-400 underline">${name}</span></span>
                            <div class="flex space-x-6 text-sm lg:text-base font-black">
                                <span class="text-red-500">💥 처형: ${data.execute}표</span>
                                <span class="text-[#e0a96d]">🌿 면죄: ${data.save}표</span>
                            </div>
                        </div>
                        <div class="w-full h-6 bg-slate-950 rounded-full overflow-hidden flex border-2 border-[#223956]">
                            <div class="bg-gradient-to-r from-red-700 to-red-500" style="width: ${data.execute === 0 && data.save === 0 ? 50 : exePct}%"></div>
                            <div class="bg-gradient-to-r from-[#1b2b42] to-[#223956]" style="width: ${data.execute === 0 && data.save === 0 ? 50 : savePct}%"></div>
                        </div>
                    </div>`;
            });
        }
function toggleSetupVisibility() {
    const setup = document.getElementById('setup-content');
    const btn = document.getElementById('btn-toggle-setup');

    setup.classList.toggle('hidden');

    btn.textContent =
        setup.classList.contains('hidden')
        ? '👁️ 설정창 보기'
        : '👁️ 설정창 숨기기';
}
        function closeCourt() {
            let killedList = [];
            let savedList = [];

            currentSuspectList.forEach(name => {
                const data = courtVotesData[name] || { execute: 0, save: 0 };
                if(data.execute >= data.save) {
                    gameState.students[name].isAlive = false;
                    killedList.push(name);
                } else {
                    savedList.push(name);
                }
            });

            db.ref('students').set(gameState.students);
            db.ref('rawVotes').set({});
            db.ref('courtVotes').set({});
            db.ref('courtStatus').set({ active: false, suspect: "" });
            db.ref('signal').set('RESET_ROUND');

            let msg = "⚖️ [ 즉결 재판 최종 판결 결과 선포 ]\n\n";
            if(killedList.length > 0) msg += `💀 CASE OUT (추방): ${killedList.join(', ')}\n`;
            if(savedList.length > 0) msg += `🌿 SURVIVED (생존): ${savedList.join(', ')}\n`;
            alert(msg);
        }
    </script>
</body>
</html>
